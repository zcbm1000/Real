<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    {% include 'include/title.html' %}

    <link href="{{ url_for('static', filename='css/common.css') }}" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/member/member.css') }}" rel="stylesheet">

    <script src="{{ url_for('static', filename='js/member.js') }}"></script>
    
</head>
<body>
    
    {% include 'include/header.html' %}
    {% include 'include/nav.html' %}

    <article id="signup_wrap">
        
        <div class="signup_form">
            <form action="/member/signup_confirm" name="signup_form" method="POST">
                <input class="input_basic" type="text" name="mId" placeholder="Input new member ID"><br>
                <input class="input_basic" type="password" name="mPw" placeholder="Input new member PW"><br>
                <input class="input_basic" type="email" name="mMail" placeholder="Input new member MAIL"><br>
                <input class="input_basic" type="text" name="mPhone" placeholder="Input new member PHONE"><br>
                <input class="input_button_basic_130" type="button" value="SIGN UP" onclick="signupForm();">
                <input class="input_button_basic_130" type="reset" value="RESET">
            </form>
        </div>

    </article>

    {% include 'include/footer.html' %}

</body>
</html>
