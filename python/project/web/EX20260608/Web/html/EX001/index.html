<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>form(양식)태그</title>
</head>
<body>
    <!-- form(양식) 태그 -->
    <form>
        <input type="text" placeholder="회원 ID 입력">
        <br>
        <input type="text" placeholder="회원 NAME 입력">
        <br>
        <input type="password" placeholder="회원 PW 입력">
        <br>
        <input type="email" placeholder="회원 Email 입력">
        <br>
        <input type="number" min="10" max="20" value="15" placeholder="회원 나이 입력">
        <br>
        좋아하는 색상: <input type="color" value="#1B51AB">
        <br>
        생일: <input type="date">
        <br>
        공부하고 싶은 시간:<input type="datetime-local">
        <br> 국가를 선택하세요<br>
        <select>
            <option>대한민국</option>
            <option>미국</option>
            <option>중국</option>
            <option>태국</option>
            <option>영국</option>
        </seect>
        <br>
        취미: 축구<input type="checkbox"> 농구<input type="checkbox"> 야구<input type="checkbox"> 배구<input type="checkbox">
        <br>
        성구분: 남:<input type="radio" name="genger"> 여:<input type="radio" name="genger">
        <br>
        직업:
        학생:<input type="radio" name="job">
        회사원:<input type="radio" name="job">
        자영업:<input type="radio" name="job">
        백수:<input type="radio" name="job">
        은퇴:<input type="radio" name="job">
        <br>
        <textarea></textarea>
        <br>

        <!-- <button>회원 가입</button> -->
        <!-- <input type="button" value="회원가입"> -->
        <input type="submit" value="회원가입">
        <input type="reset" value="초기화">
</form>

</html>
