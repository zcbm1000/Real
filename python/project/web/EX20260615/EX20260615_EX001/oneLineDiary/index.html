<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ONELINE DIARY</title>
    <link rel="stylesheet" href="./css/common.css">
    <link rel="stylesheet" href="./css/index.css">
    
    <script src="./js/viewChange.js"></script>
    <script src="./js/index.js"></script>
    <script src="./js/db.js"></script>
</head>
<body>
    
    <div id="wrap">

        <!-- 제목 -->
         <div class="title_wrap">
            Oneline Diary
         </div>

        <!-- 메뉴 -->
         <div class="menu_wrap">
            <a class="sign_up" href="#none">Sign-up</a>
            <a class="sign_in" href="#none">Sign-in</a>
            <a class="sign_out" href="#none">Sign-out</a>
            <a class="write" href="#none">write</a>
            <a class="list" href="#none">List</a>
         </div>

        <!-- 회원 가입 페이지 -->
         <div class="sign_up_wrap">
            <input class="basic_input" type="text" name="u_id" placeholder="아이디를 입력하세요.">
            <br>
            <input class="basic_input" type="password" name="u_pw" placeholder="비밀번호를 입력하세요.">
            <br>
            <input class="basic_input" type="email" name="u_mail" placeholder="이메일을 입력하세요.">
            <br>
            <input class="basic_bitton" type="button" value="회원가입">
         </div>

        <!-- 회원 로그인 페이지 -->
        <div class="sign_in_wrap">
            <input class="basic_input" type="text" name="u_id" placeholder="아이디를 입력하세요.">
            <br>
            <input class="basic_input" type="password" name="u_pw" placeholder="비밀번호를 입력하세요.">
            <br>
            <input class="basic_bitton" type="button" value="로그인">
         </div>

        <!-- 일기 작성 페이지 -->
        <div class="write_wrap">
            <input type="text"><button>Write</button>
         </div>

        <!-- 일기 리스트 페이지 -->
        <div class="list_wrap">
            1234
         </div>

    </div>

</body>
</html>
