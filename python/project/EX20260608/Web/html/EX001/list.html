<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- 목록 관련 태그 -->

    <!-- 순서 없는 목록 태그 -->
<h1> 메뉴판 </h1>
     <ul>
        <li>짜장면 7,000 </li>
        <li>짬뽕 8,000 </li>
        <li>간짜장 9,000 </li>
     </ul>

    <!-- 순서 있는 목록 태그 -->
<h1> 메뉴판 </h1>
     <ol>
        <type="A">
        <li>짜장면 7,000 </li>
        <li>짬뽕 8,000 </li>
         <li>간짜장 9,000 </li>
    </ol>

    <!-- 설명 목록 -->
<dl>  
    <dt> 오전 메뉴판 </dt>
    <dd> 짜장면 7,000 </dd>
    <dd> 짬뽕 8,000 </dd>
    <dd> 간짜장 9,000 </dd>


    <dt> 오후 메뉴판 </dt>
    <dd> 탕수육 7,000 </dd>
    <dd> 양장피 8,000 </dd>
    <dd> 유린기 9,000 </dd>
</dl>


</body>
</html>
