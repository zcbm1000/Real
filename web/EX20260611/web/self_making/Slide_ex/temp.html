<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>position</title>

    <style>
        div{
            width: 300px;
            height: 100px;
            text-align: center;
        }
        div.redbox{
            background-color: red;
            position:fixed;
            top:050;
        }

        div.greenbox{
            background-color: green;
            position:relative;
            top: 50px;
            left: 100px;
        }

        div.bluebox{
            background-color: blue;
            position:absolute;
            top:500;
            left:700;
        }
    </style>

</head>
<body>
    <div class="redbox">첫번째 요소</div>
    <div class="greenbox">두번째 요소</div>
