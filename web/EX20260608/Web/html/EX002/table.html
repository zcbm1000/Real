<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TABLE</title>
</head>
<body>
    <H1>TABLE</H1>
        <!-- 표 관련 태그 -->
         <table border="1">
            <thead>
                <tr>
                    <th>1열</th>
                    <th>2열</th>
                    <th>3열</th>
                </tr>
            </thead>
            <tr>                                         <!-- 행 -->
                <td>1행1열</td>                           <!-- 열 -->
                <td>1행2열</td>                           <!-- 열 -->
                <td>1행3열</td>                           <!-- 열 -->             
            </tr>
            <tr>
                <td>2행1열</td>
                <td>2행2열</td>
                <td>2행3열</td>
            </tr>
            <tr>
                <td>3행1열</td>
                <td>3행2열</td>
                <td>3행3열</td>
            </tr>
         </table>

        <br>
        <table border="3">
            <tr>
                <td rowspan="2">과목/학기</td>
                <td colspan="2">국어</td>
                <td colspan="2">수학</td>
                <td colspan="2">영어</td>
            </tr>
            <tr>
                <td>1학기</td>
                <td>2학기</td>
                <td>1학기</td>
                <td>2학기</td>
                <td>1학기</td>
                <td>2학기</td>
            </tr>            
            <tr>
                <td>홍길동</td>
                <td>85</td>
                <td>90</td>
                <td>100</td>
                <td>50</td>
                <td>65</td>
                <td>75</td>
            </tr>
            <tr>
                <td>박찬호</td>
                <td>60</td>
                <td>65</td>
                <td>80</td>
                <td>85</td>
                <td>100</td>
                <td>95</td>
            </tr>
            <tr>
                <td>박세리</td>
                <td>90</td>
                <td>95</td>
                <td>100</td>
                <td>100</td>
                <td>70</td>
                <td>80</td>
            </tr>                        
        </table>
</body>
</html>
