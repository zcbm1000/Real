<!-- shift + ! 기본 뼈대 생성 -->

<!DOCTYPE html>

<!DOCTYPE HTML PUBLIC "-//W3C//DTD HTML 4.01 Transitiional//EN">

<html lang="en">
<!-- <html> 태그는 웹 문서의 시작을 나타낸다. -->

<head>
    <meta charset="UTF-8">    <!-- 나홀로 태그-->
    <!-- <meta> 태그는 웹 문서가 출력될 때 사용되는 인코딩을 설정함.
         대부분의 모델에서는 UTF-8 을 사용함 -->
    <title>MyHome</title>
    <!-- 웹 문서의 제목을 출력함 -->
</head>
<!-- 웹 문서의 설정 정보를 표기함 -->

<body>
    This is index001 page.
    <!-- 처음만들어보는 웹 문서 입니다. -->
</body>
<!-- 웹 문서에서 화면에 출력(랜더링) 되는 정보를 코딩한다 -->
</html>
<!-- <html> 태그는 웹 문서의 뜻을 나타낸다 -->
